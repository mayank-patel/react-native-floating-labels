name: CI

on:
  push:
    branches: [master, beta]
  pull_request:
    branches: [master, beta]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run type-check
      - run: npm test
      - run: npm run build
